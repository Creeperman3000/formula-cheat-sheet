{% extends "base.html" %}
{% block title %}{{ heading }}{% endblock %}
{% block content %}

<h2>{{ heading }}</h2>

{% if formulas %}
<div class="formula-grid">
{% for f in formulas %}
  <div class="formula-card">
    <a href="/formula/{{ f.id }}">
      <div class="formula-eqn">$${{ f.latex }}$$</div>
      <div class="formula-name">{{ f.name_en }}</div>
    </a>
  </div>
{% endfor %}
</div>
{% else %}
<p>No formulas found matching the selected filters.</p>
{% endif %}

{% endblock %}
