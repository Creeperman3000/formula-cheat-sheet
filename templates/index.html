{% extends "base.html" %}
{% block title %}Scifind{% endblock %}
{% block content %}

<h2>SI Base Units</h2>
<table>
<tr><th>Unit</th><th>Name</th><th>Symbol</th><th>Quantity</th></tr>
{% for u in base_units %}
<tr>
  <td>${{ u.symbol }}$</td>
  <td><a href="/unit/{{ u.id }}">{{ u.name_en }}</a></td>
  <td>${{ u.quantity_symbol }}$</td>
  <td><a href="/quantity/{{ u.quantity_id }}">{{ u.quantity_name }}</a></td>
</tr>
{% endfor %}
</table>

{% endblock %}
